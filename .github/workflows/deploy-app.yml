name: Build & Deploy App (Backend + Frontend)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - 'Caddyfile'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/money-tracking-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/money-tracking-frontend

jobs:
  # ── Build & Push Docker Images ─────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ secrets.APP_DOMAIN }}/api
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ke EC2 ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Pull latest images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            cd /opt/app

            # Update .env dengan nilai terbaru
            cat > .env << 'EOF'
            DB_HOST=${{ secrets.TF_VAR_db_host }}
            DB_NAME=${{ secrets.TF_VAR_db_name }}
            DB_USER=${{ secrets.TF_VAR_db_username }}
            DB_PASSWORD=${{ secrets.TF_VAR_db_password }}
            N8N_PASSWORD=${{ secrets.TF_VAR_n8n_password }}
            N8N_DOMAIN=${{ secrets.N8N_DOMAIN }}
            APP_DOMAIN=${{ secrets.APP_DOMAIN }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            N8N_ENCRYPTION_KEY=${{ secrets.N8N_ENCRYPTION_KEY }}
            DUCKDNS_TOKEN=${{ secrets.TF_VAR_duckdns_token }}
            GITHUB_REPO=${{ github.repository_owner }}
            IMAGE_TAG=${{ github.sha }}
            EOF

            # Copy docker compose & Caddyfile terbaru
            # (file sudah ada via user_data atau manual copy pertama kali)

            # Pull & restart services
            docker compose pull backend frontend
            docker compose up -d backend frontend caddy

            # Cleanup dangling images
            docker image prune -f
