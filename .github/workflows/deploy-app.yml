name: Deploy App (EC2 Build)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - 'Caddyfile'

jobs:
  # ── Deploy ke EC2 (Clone & Build Lokal EC2) ──────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Exit segera bila ada error di bash script SSH
            set -e
            
            # Setup Git Repository di EC2
            if [ ! -d ~/money-tracking/.git ]; then
              echo "Cloning repository..."
              git clone https://github.com/${{ github.repository }}.git ~/money-tracking
            fi
            
            cd ~/money-tracking
            echo "Pulling latest changes..."
            git pull origin main

            # Update .env dengan rahasia dari GitHub
            cat > .env << 'EOF'
            DB_HOST=${{ secrets.TF_VAR_db_host }}
            DB_NAME=${{ secrets.TF_VAR_db_name }}
            DB_USER=${{ secrets.TF_VAR_db_username }}
            DB_PASSWORD=${{ secrets.TF_VAR_db_password }}
            N8N_PASSWORD=${{ secrets.TF_VAR_n8n_password }}
            N8N_DOMAIN=${{ secrets.N8N_DOMAIN }}
            APP_DOMAIN=${{ secrets.APP_DOMAIN }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            N8N_ENCRYPTION_KEY=${{ secrets.N8N_ENCRYPTION_KEY }}
            DUCKDNS_TOKEN=${{ secrets.TF_VAR_duckdns_token }}
            GITHUB_REPO=${{ github.repository }}
            GITHUB_OWNER=${{ github.repository_owner }}
            IMAGE_TAG=${{ github.sha }}
            EOF

            # Build dan jalankan docker lokal (Frontend, Backend)
            echo "Building and starting containers..."
            sudo docker compose up --build -d backend frontend caddy

            # Bersihkan sampah build
            sudo docker image prune -f
